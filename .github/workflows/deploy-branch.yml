name: Deploy Branch

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
        description: Version for this release. Format "X.X.X".

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release notes from commit
        id: notes
        run: |
          # This workflow runs via workflow_dispatch, so there is no
          # pull_request / head_commit event payload to read - grab the
          # latest commit message on main directly instead.
          {
            echo 'body<<EOF'
            git log -1 --pretty=%B
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create release branch
        uses: peterjgrainger/action-create-branch@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: version/${{ github.event.inputs.version }}

      - name: Create release in GitHub
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          commit: ${{ github.sha }}
          body: ${{ steps.notes.outputs.body }}
